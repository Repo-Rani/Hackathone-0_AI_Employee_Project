<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- Background Circle -->
  <circle cx="50" cy="50" r="48" fill="hsl(243, 75%, 65%)" opacity="0.1"/>
  
  <!-- Robot Head -->
  <rect x="25" y="30" width="50" height="40" rx="8" fill="hsl(243, 75%, 65%)"/>
  
  <!-- Eyes -->
  <circle cx="38" cy="45" r="5" fill="white"/>
  <circle cx="62" cy="45" r="5" fill="white"/>
  <circle cx="38" cy="45" r="2" fill="hsl(243, 75%, 65%)"/>
  <circle cx="62" cy="45" r="2" fill="hsl(243, 75%, 65%)"/>
  
  <!-- Antenna -->
  <line x1="50" y1="30" x2="50" y2="18" stroke="hsl(243, 75%, 65%)" stroke-width="3"/>
  <circle cx="50" cy="15" r="4" fill="hsl(188, 94%, 43%)"/>
  
  <!-- Mouth -->
  <rect x="35" y="58" width="30" height="4" rx="2" fill="white"/>
  
  <!-- Body -->
  <rect x="30" y="72" width="40" height="20" rx="6" fill="hsl(243, 75%, 65%)" opacity="0.8"/>
  
  <!-- AI Badge -->
  <text x="50" y="87" text-anchor="middle" fill="white" font-size="10" font-weight="bold" font-family="Arial">AI</text>
</svg>
